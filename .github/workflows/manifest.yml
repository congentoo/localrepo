name: manifest

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest:
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3:latest
      options: --user root
    steps:
      - name: Install pkgdev
        run: |
          emerge-webrsync --quiet
          # Import Gentoo release keys so binpkg GPG verification succeeds
          getuto
          emerge --getbinpkg --usepkg --quiet-build dev-util/pkgdev

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure repo
        run: |
          # Convert repos.conf to a directory if it's a file
          if [ -f /etc/portage/repos.conf ]; then
            mv /etc/portage/repos.conf /etc/portage/repos.conf.bak
            mkdir -p /etc/portage/repos.conf
            mv /etc/portage/repos.conf.bak /etc/portage/repos.conf/gentoo.conf
          else
            mkdir -p /etc/portage/repos.conf
          fi
          # Ensure gentoo repo is explicitly defined (creating the directory
          # overrides portage's built-in defaults)
          if ! grep -rq '\[gentoo\]' /etc/portage/repos.conf/ 2>/dev/null; then
            cat > /etc/portage/repos.conf/gentoo.conf <<REPOEOF
          [DEFAULT]
          main-repo = gentoo

          [gentoo]
          location = /var/db/repos/gentoo
          auto-sync = no
          REPOEOF
          fi
          cat > /etc/portage/repos.conf/ci.conf <<REPOEOF
          [ci]
          location = ${GITHUB_WORKSPACE}
          masters = gentoo
          auto-sync = no
          REPOEOF

      - name: Verify manifests up-to-date
        working-directory: ${{ github.workspace }}
        run: |
          # Mark workspace as a safe git directory (container runs as root
          # but the checkout may have a different owner)
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Regenerate manifests in place; the workspace is registered as
          # the [ci] repo in repos.conf, so pkgdev can resolve masters.
          pkgdev manifest --if-modified || pkgdev manifest
          if ! git diff --exit-code --name-only; then
            echo "::error::Manifest files are out of date."
            echo "Run 'pkgdev manifest' locally and commit the changes."
            exit 1
          fi
          echo "✓ All manifests are up to date"
