name: lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'

      # Runs pre-commit for the portable hooks (shellcheck, yamllint,
      # mdformat, basic hygiene). The Gentoo-specific local hooks need
      # portage and friends installed and are skipped here:
      #   - pkgcheck, manifest-check: covered by pkgcheck.yml / manifest.yml
      #   - md5-cache: needs portage/egencache — maintainers run locally
      #   - no-absolute-homedir: re-implemented inline below for portability
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
        env:
          SKIP: pkgcheck,manifest-check,md5-cache,no-absolute-homedir

      - name: Check for hardcoded /home paths
        run: |
          if grep -rnE '(^|[^a-zA-Z0-9_.-])/home/' --include='*.ebuild' --include='*.eclass' .; then
            echo "::error::Hardcoded /home/ paths found in ebuilds/eclasses"
            exit 1
          fi
          echo "OK: no hardcoded /home/ paths"
