name: pkgcheck

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily at 06:00 UTC to catch regressions from Gentoo tree updates
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run pkgcheck
        # pkgcheck-action has no tagged releases; pin to the latest main SHA
        uses: pkgcore/pkgcheck-action@8491e92faa1010d5c6947c114d23215e5a74684e  # 2026-03-24
        with:
          # --net             enable HomepageUnreachable etc.
          # --arches=amd64    only arch targeted by this overlay
          # -RedundantVersion older versions kept intentionally for rollback
          args: >-
            --net
            --arches=amd64
            --keywords=-RedundantVersion
